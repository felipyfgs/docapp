services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiscal}
      POSTGRES_USER: ${POSTGRES_USER:-fiscal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fiscal}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fiscal} -d $${POSTGRES_DB:-fiscal}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - fiscal-net

  sped:
    build:
      context: ./sped
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - LOG_CHANNEL=stderr
      - LOG_LEVEL=info
      - DB_CONNECTION=sqlite
      - CACHE_STORE=file
      - SESSION_DRIVER=array
      - QUEUE_CONNECTION=sync
      - FISCAL_CERTS_PATH=/var/www/html/storage/certs
      - SEFAZ_DOWNLOAD_LIMIT_PER_HOUR=20
      - SEFAZ_DISTDFE_MAX_LOOPS=12
      - SEFAZ_DISTDFE_SLEEP_SECONDS=2
      - SEFAZ_RETRY_AFTER_SECONDS=3600
    volumes:
      - ./sped:/var/www/html
      - sped_vendor:/var/www/html/vendor
      - sped_bootstrap_cache:/var/www/html/bootstrap/cache
      - ./core/certs:/var/www/html/storage/certs:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - fiscal-net

  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - fiscal-net

networks:
  fiscal-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  sped_vendor:
  sped_bootstrap_cache:
